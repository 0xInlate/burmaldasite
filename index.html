<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BurmaldaSite | бурмалда </title>
    <style>
        :root {
            --bg-deep: #0a0014;
            --purple-glow: #aa6eff;
            --purple-bright: #b87cff;
            --purple-light: #d9aaff;
            --card-bg: rgba(20, 5, 50, 0.7);
            --radius-lg: 28px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-stack: 'MineCustom', 'Courier New', monospace;
            --side-panel-width: 68px;
            --side-panel-expanded: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @font-face {
            font-family: 'MineCustom';
            src: url('assets/mine.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: var(--font-stack);
            background: #0a0014;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            -webkit-font-smoothing: antialiased;
            contain: layout style;
            --text-main: #f0e6ff;
        }

        
        .bg-gradient,
        .grid-overlay,
        .ambient-glow,
        .scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        .bg-gradient {
            z-index: -3;
            background: radial-gradient(circle at 40% 20%, #0b2b4a, #001428 80%);
            animation: bgShift 12s ease-in-out infinite;
        }
        @keyframes bgShift {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.85;
                filter: hue-rotate(10deg);
            }
        }
        .grid-overlay {
            z-index: -2;
            background-image: linear-gradient(rgba(0, 180, 255, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.12) 1px, transparent 1px);
            background-size: 80px 80px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0%,
            100% {
                background-position: 0 0;
            }
            50% {
                background-position: 2px 2px;
            }
        }
        .ambient-glow {
            z-index: -1;
            background: radial-gradient(circle at 60% 70%, rgba(0, 120, 210, 0.3), transparent 70%);
            animation: ambientPulse 8s ease-in-out infinite;
        }
        @keyframes ambientPulse {
            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.08);
            }
        }
        .scanlines {
            z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            opacity: 0.35;
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        
        .side-panel {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            height: 100dvh;
            width: var(--side-panel-width);
            background: rgba(5, 15, 35, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 2px solid #0080dd;
            box-shadow: 6px 0 28px rgba(0, 130, 230, 0.5);
            transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 300;
            overflow: hidden;
            white-space: nowrap;
            contain: layout style;
        }
        .side-panel:hover {
            width: var(--side-panel-expanded);
        }
        .dim-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
            pointer-events: none;
            z-index: 299;
        }
        .side-panel:hover~.dim-overlay {
            opacity: 1;
            visibility: visible;
        }
        .panel-items {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 2rem 0.4rem;
            gap: 1rem;
        }
        .spacer {
            flex-grow: 1;
        }
        .panel-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: transparent;
            padding: 10px 6px;
            border: 1px solid transparent;
            border-radius: 44px;
            cursor: pointer;
            transition: all 0.2s;
            width: fit-content;
            position: relative;
        }
        .side-panel:hover .panel-item {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 160, 255, 0.4);
            padding: 14px 22px;
        }
        .panel-item:hover {
            background: #0055cccc !important;
            transform: scale(1.03);
            border-color: #77ccff !important;
            box-shadow: 0 0 16px #0099ff;
            animation: btnPulse 0.6s ease-out;
        }
        @keyframes btnPulse {
            0% {
                box-shadow: 0 0 8px #0099ff;
            }
            50% {
                box-shadow: 0 0 32px #77ccff, 0 0 60px #0066cc;
            }
            100% {
                box-shadow: 0 0 16px #0099ff;
            }
        }
        .panel-item:active {
            transform: scale(0.94) !important;
            transition: transform 0.08s ease;
        }
        .panel-icon {
            display: inline-block;
            width: 38px;
            text-align: center;
            font-size: 1.7rem;
            color: #ddd;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.35));
            transition: transform 0.2s;
        }
        .panel-item:hover .panel-icon {
            transform: rotate(-8deg) scale(1.15);
        }
        .panel-text {
            font-family: var(--font-stack);
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            font-weight: bold;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s 0.08s, visibility 0.2s;
        }
        .side-panel:hover .panel-text {
            opacity: 1;
            visibility: visible;
        }

        
        .top-controls {
            position: fixed;
            top: 18px;
            right: 18px;
            display: flex;
            gap: 12px;
            z-index: 400;
            align-items: center;
        }
        .lang-switch {
            background: rgba(5, 15, 35, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #0080dd;
            border-radius: 60px;
            padding: 10px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            transition: all 0.2s;
            color: var(--text-main);
            font-family: var(--font-stack);
        }
        .lang-switch:hover {
            background: #0055cccc;
            transform: scale(1.06);
            border-color: #77ccff;
            box-shadow: 0 0 14px #0099ff;
        }
        .lang-switch:active {
            transform: scale(0.92) !important;
        }
        .lang-icon {
            font-size: 1.1rem;
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }
        .lang-text {
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .home-cross {
            font-size: 34px;
            font-family: 'Courier New', monospace;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1;
            text-shadow: 0 0 8px #0099ff;
        }
        .home-cross:hover {
            color: #fff;
            transform: scale(1.15) rotate(90deg);
            text-shadow: 0 0 20px #77ccff, 0 0 40px #0066cc;
        }
        .home-cross:active {
            transform: scale(0.85) rotate(180deg) !important;
            transition: transform 0.08s ease;
        }

        
        .main-container {
            flex: 1;
            margin-left: var(--side-panel-width);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1.5rem 0.5rem;
            position: relative;
            z-index: 10;
            contain: layout style;
            min-width: 0;
        }

        
        #dynamicWord {
            font-family: var(--font-stack);
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            letter-spacing: 5px;
            text-shadow: 0 0 12px #33aaff, 0 0 28px #0077cc, 0 0 50px #003366;
            background: linear-gradient(135deg, #e6f2ff, #99ccff, #cce6ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1rem;
            animation: titleGlitch 6s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes titleGlitch {
            0%,
            90%,
            100% {
                transform: translate(0);
            }
            91% {
                transform: translate(-3px, 2px);
            }
            92% {
                transform: translate(3px, -1px);
            }
            93% {
                transform: translate(-1px, -2px);
            }
            94% {
                transform: translate(1px, 1px);
            }
            95% {
                transform: translate(0);
            }
        }
        #dynamicWord.glitch-heavy {
            animation: glitchBurst 0.4s ease-out;
        }
        @keyframes glitchBurst {
            0% {
                transform: translate(0);
                text-shadow: 0 0 12px #33aaff, 0 0 28px #0077cc;
            }
            20% {
                transform: translate(-6px, 3px);
                text-shadow: -4px 0 #ff00ff, 4px 0 #00ffff, 0 0 40px #fff;
            }
            40% {
                transform: translate(5px, -2px);
                text-shadow: 4px 0 #ff00ff, -4px 0 #00ffff;
            }
            60% {
                transform: translate(-3px, -4px);
                text-shadow: -6px 0 #ff00ff, 6px 0 #00ffff, 0 0 50px #fff;
            }
            100% {
                transform: translate(0);
                text-shadow: 0 0 12px #33aaff, 0 0 28px #0077cc;
            }
        }

        
        .tab-content {
            width: 100%;
            flex: 1;
            min-height: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(0, 160, 255, 0.4);
            display: flex;
            flex-wrap: nowrap;
            padding: 1rem;
            gap: 1.5rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            contain: layout style;
            animation: fadeSlideIn 0.4s ease-out;
            overflow-x: hidden;
            overflow-y: auto;
            flex-wrap: wrap;
            align-content: flex-start;
        }
        .tab-content::-webkit-scrollbar {
            width: 8px;
        }
        .tab-content::-webkit-scrollbar-track {
            background: #0a1a2e;
            border-radius: 10px;
        }
        .tab-content::-webkit-scrollbar-thumb {
            background: #0099dd;
            border-radius: 10px;
            box-shadow: 0 0 8px #0099ff;
        }
        .tab-content.hidden {
            display: none !important;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        
        .geo-empty {
            min-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            height: 100%;
        }
        .sad-emoji {
            font-size: clamp(4rem, 8vw, 7rem);
            animation: sadFloat 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 25px rgba(0, 160, 255, 0.7));
        }
        @keyframes sadFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            30% {
                transform: translateY(-18px) rotate(-3deg);
            }
            60% {
                transform: translateY(-8px) rotate(2deg);
            }
            85% {
                transform: translateY(-22px) rotate(-1deg);
            }
        }
        .geo-empty-text {
            font-size: 1.3rem;
            color: #a0c8e0;
            letter-spacing: 2px;
            animation: textFadePulse 2.5s ease-in-out infinite;
        }
        @keyframes textFadePulse {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
        .geo-empty-dots span {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0099dd;
            margin: 0 6px;
            animation: dotBounce 1.8s ease-in-out infinite;
            box-shadow: 0 0 10px #0099ff;
        }
        .geo-empty-dots span:nth-child(2) {
            animation-delay: 0.3s;
        }
        .geo-empty-dots span:nth-child(3) {
            animation-delay: 0.6s;
        }
        @keyframes dotBounce {
            0%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-16px);
                opacity: 1;
            }
        }

        
        .ocean-full-slide {
            width: 100%;
            max-width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            background: rgba(5, 15, 35, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 160, 255, 0.5);
            border-radius: 32px;
            padding: 1.5rem 2rem;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #0099dd #0a1a2e;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            animation: fadeSlideIn 0.5s ease-out;
        }
        .ocean-full-slide::-webkit-scrollbar {
            width: 5px;
        }
        .ocean-full-slide::-webkit-scrollbar-track {
            background: #0a1a2e;
            border-radius: 10px;
        }
        .ocean-full-slide::-webkit-scrollbar-thumb {
            background: #0099dd;
            border-radius: 10px;
        }
        .ocean-full-slide h2 {
            color: #99d6ff;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 160, 255, 0.6);
            flex-shrink: 0;
            text-align: center;
        }
        .ocean-full-slide .ocean-intro {
            text-align: center;
            color: #c0d8f0;
            font-size: 0.95rem;
            flex-shrink: 0;
            line-height: 1.5;
            max-width: 700px;
            margin: 0 auto;
        }
        .ocean-banner {
            width: 100%;
            height: 200px;
            border-radius: 24px;
            border: 2px dashed rgba(0, 160, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            color: #7a9ab8;
            font-size: 0.8rem;
            letter-spacing: 2px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .ocean-banner img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
            animation: imgFadeIn 0.8s ease-out;
        }
        @keyframes imgFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .ocean-banner:hover {
            border-color: #77ccff;
            box-shadow: 0 0 20px rgba(0, 160, 255, 0.35);
        }
        .ocean-facts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            flex-shrink: 0;
        }
        .ocean-fact-card {
            background: rgba(0, 0, 0, 0.28);
            border-radius: 20px;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(0, 160, 255, 0.3);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
            min-width: 0;
            opacity: 0;
            transform: translateY(25px);
        }
        .ocean-fact-card.revealed {
            opacity: 1;
            transform: translateY(0);
        }
        .ocean-fact-card:hover {
            border-color: #77ccff;
            box-shadow: 0 0 22px rgba(0, 160, 255, 0.4);
            transform: translateY(-4px);
        }
        .ocean-fact-card .fact-num {
            font-size: 2.5rem;
            color: #77ccff;
            text-shadow: 0 0 12px rgba(0, 160, 255, 0.6);
            font-weight: bold;
            line-height: 1;
        }
        .ocean-fact-card h3 {
            color: #99d6ff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .ocean-fact-card p {
            font-size: 0.85rem;
            line-height: 1.45;
            color: #c0d0e8;
            flex-grow: 1;
        }
        .ocean-fact-card .fact-img-slot {
            width: 100%;
            min-height: 100px;
            max-height: 140px;
            border: 2px dashed rgba(0, 160, 255, 0.35);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            color: #7a9ab8;
            font-size: 0.7rem;
            letter-spacing: 1px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .ocean-fact-card .fact-img-slot img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
            animation: imgFadeIn 0.5s ease-out;
        }
        .ocean-fact-card .fact-img-slot:hover {
            border-color: #77ccff;
            box-shadow: 0 0 14px rgba(0, 160, 255, 0.3);
        }

        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: rippleEffect 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 2;
        }
        @keyframes rippleEffect {
            to {
                transform: scale(6);
                opacity: 0;
            }
        }

        
        .back-btn {
            display: inline-block;
            background: rgba(0, 160, 255, 0.25);
            border: 1px solid #0080dd;
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            font-family: var(--font-stack);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
            letter-spacing: 1px;
            text-align: center;
            width: fit-content;
            flex-shrink: 0;
            align-self: center;
            margin-top: 0.3rem;
        }
        .back-btn:hover {
            background: #0066cc;
            transform: scale(1.05);
            box-shadow: 0 0 14px #0099ff;
        }
        .back-btn:active {
            transform: scale(0.94) !important;
            transition: transform 0.08s ease;
        }

        
        .profile-slides {
            display: flex;
            flex-wrap: nowrap;
            gap: 2rem;
            height: 100%;
            align-items: center;
        }
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.8rem;
            border: 1px solid rgba(0, 160, 255, 0.4);
            transition: all 0.2s;
            flex: 0 0 auto;
            width: 300px;
            max-width: 85vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            content-visibility: auto;
            contain: layout style;
        }
        .profile-card:hover {
            transform: translateY(-5px);
            border-color: #77ccff;
            box-shadow: 0 0 22px rgba(0, 160, 255, 0.5);
        }
        .profile-avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #0080dd;
            object-fit: cover;
            background: #0a1a2e;
            animation: avatarGlow 4s ease-in-out infinite;
        }
        @keyframes avatarGlow {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(0, 160, 255, 0.4);
            }
            50% {
                box-shadow: 0 0 35px rgba(0, 160, 255, 0.8), 0 0 60px rgba(0, 100, 200, 0.5);
            }
        }
        .profile-nick {
            font-size: 1.8rem;
            color: #99d6ff;
            letter-spacing: 2px;
            text-align: center;
        }
        .fact-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 0.8rem;
            border-left: 4px solid #0080dd;
            margin: 0.3rem 0;
            font-size: 0.85rem;
            text-align: left;
            width: 100%;
            line-height: 1.4;
        }
        .fact-item strong {
            color: #77ccff;
        }

        
        @media (max-width: 768px) {
            :root {
                --side-panel-width: 52px;
            }
            .main-container {
                margin-left: var(--side-panel-width);
                padding: 0.8rem;
            }
            #dynamicWord {
                font-size: 1.4rem;
                letter-spacing: 3px;
            }
            .ocean-full-slide {
                padding: 1rem;
                border-radius: 24px;
            }
            .ocean-facts-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            .ocean-fact-card {
                padding: 0.8rem 1rem;
            }
            .ocean-fact-card .fact-num {
                font-size: 2rem;
            }
            .ocean-banner {
                height: 140px;
            }
            .profile-card {
                width: 240px;
                padding: 1.2rem;
            }
            .profile-nick {
                font-size: 1.4rem;
            }
            .top-controls {
                top: 10px;
                right: 10px;
                gap: 8px;
            }
            .lang-switch {
                padding: 8px 14px;
            }
            .lang-text {
                font-size: 0.8rem;
            }
            .home-cross {
                font-size: 28px;
            }
            .tab-content {
                padding: 0.6rem;
                gap: 1rem;
                border-radius: 24px;
            }
        }
        @media (max-width: 400px) {
            .ocean-facts-grid {
                grid-template-columns: 1fr;
            }
            .profile-slides {
                gap: 1rem;
            }
            .profile-card {
                width: 78vw;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="ambient-glow"></div>
    <div class="scanlines"></div>
    <canvas id="particleCanvas"></canvas>

    
    <div class="side-panel">
        <div class="panel-items">
            <div class="panel-item" data-tab="geo">
                <div class="panel-icon">⌗</div>
                <div class="panel-text" data-i18n="geoLabel">ГЕОГРАФИЯ</div>
            </div>
            <div class="panel-item" data-tab="eng">
                <div class="panel-icon">🦞</div>
                <div class="panel-text" data-i18n="engLabel">ОКЕАН</div>
            </div>
            <div class="spacer"></div>
            <div class="panel-item" data-tab="profile">
                <div class="panel-icon">⦿</div>
                <div class="panel-text" data-i18n="profileLabel">ПРОФИЛЬ</div>
            </div>
        </div>
    </div>
    <div class="dim-overlay"></div>

    
    <div class="top-controls">
        <div class="lang-switch" id="langToggleBtn">
            <span class="lang-icon">🌐</span>
            <span class="lang-text" id="langIndicator">RU</span>
        </div>
        <div class="home-cross" id="homeCrossBtn">✕</div>
    </div>

    
    <div class="main-container">
        <div id="dynamicWord">BURMALDASITE</div>

        
        <div id="geoContent" class="tab-content hidden">
            <div class="geo-empty">
                <div class="sad-emoji">😢</div>
                <div class="geo-empty-text" data-i18n="geoEmptyText">здесь пока ничего нет...</div>
                <div class="geo-empty-dots"><span></span><span></span><span></span></div>
            </div>
        </div>

        
        <div id="engContent" class="tab-content hidden">
            <div id="oceanFullContainer" class="ocean-full-slide"></div>
        </div>

        
        <div id="profileContent" class="tab-content hidden">
            <div class="profile-slides" id="profileSlidesContainer"></div>
        </div>
    </div>


    <script>
        (function() {
            // ── DOM-элементы ──────────────────────────────
            const titleEl = document.getElementById('dynamicWord');
            const geoContent = document.getElementById('geoContent');
            const engContent = document.getElementById('engContent');
            const oceanFullContainer = document.getElementById('oceanFullContainer');
            const profileContent = document.getElementById('profileContent');
            const profileSlidesContainer = document.getElementById('profileSlidesContainer');
            const langToggleBtn = document.getElementById('langToggleBtn');
            const langIndicator = document.getElementById('langIndicator');
            const homeCrossBtn = document.getElementById('homeCrossBtn');
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');

            
            let currentLang = localStorage.getItem('lang') || 'ru';
            let currentTab = localStorage.getItem('tab') || null;
            let animationActive = true;
            let animInterval = null,
                animTimeout = null;
            let particles = [],
                w, h, rafId = null;
            let mouseX = -200,
                mouseY = -200;

            const t = {
                ru: {
                    geoLabel: 'ГЕОГРАФИЯ',
                    engLabel: 'ОКЕАН',
                    profileLabel: 'ПРОФИЛЬ',
                    geoEmptyText: 'здесь пока ничего нет...',
                    backBtn: '← НА ГЛАВНУЮ',
                    weatherTitle: 'ПОГОДА',
                    oceanTitle: 'ФАКТЫ ПРО ОКЕАН',
                    oceanIntro: 'Мировой океан покрывает более 70% поверхности Земли и скрывает невероятные тайны. Вот пять фактов.',
                    fact1Title: 'Кислород от планктона',
                    fact1Text: 'Фитопланктон — крошечные водоросли — производит от 50% до 80% всего кислорода на Земле. Они вырабатывают больше кислорода, чем все леса мира вместе взятые, и являются основой морской пищевой цепи.',
                    fact2Title: 'Марианская впадина',
                    fact2Text: 'Самое глубокое место на планете — 11 034 метра. Если бросить камень, он будет падать больше часа, прежде чем достигнет дна. Давление там в 1000 раз выше, чем на поверхности.',
                    fact3Title: 'Подводные реки',
                    fact3Text: 'На дне океана существуют настоящие реки и озёра из сверхсолёной воды. Они текут по своим руслам, образуя берега и даже водопады под водой.',
                    fact4Title: 'Золото в воде',
                    fact4Text: 'В водах Мирового океана растворено около 20 миллионов тонн золота. К сожалению, оно настолько рассеяно, что добывать его пока нерентабельно.',
                    fact5Title: '91% видов не открыты',
                    fact5Text: 'По оценкам учёных, мы изучили лишь 9% океанских глубин. Океан остаётся менее исследованным, чем поверхность Марса или Луны.',
                    profileTitle: 'ПРОФИЛЬ',
                    profileNick: '0xInlate',
                    factsTitle: 'Интересные факты',
                    projectTitle: 'Работа над проектом',
                    projectDates: '? - 6 майа 2026',
                    projectRole: 'пастер какой та',
                    facts: [
                        'за время создания сайта я выпил 5 литров чая (не актуально)',
                        'прослушал весь свой плейлист... (не актуально)',
                        'я буду обновлять сайт (актуально)',
                        'хост на картошке',
                        'сус вылазь там радиация (не актуально)',
                        'я уже красный (не актуально)',
                        'github pages платный? (не актуально)',
                        'бобр ку##а я пе###е (осуждаю)'
                    ]
                },
                en: {
                    geoLabel: 'GEOGRAPHY',
                    engLabel: 'OCEAN',
                    profileLabel: 'PROFILE',
                    geoEmptyText: 'nothing here yet...',
                    backBtn: '← BACK HOME',
                    weatherTitle: 'WEATHER',
                    oceanTitle: 'OCEAN FACTS',
                    oceanIntro: 'The world ocean covers over 70% of the Earth\'s surface and hides incredible secrets. Here are five mind-blowing facts.',
                    fact1Title: 'Plankton Oxygen',
                    fact1Text: 'Phytoplankton — tiny algae — produce 50% to 80% of all oxygen on Earth. They generate more oxygen than all the world\'s forests combined and form the base of the marine food web.',
                    fact2Title: 'Mariana Trench',
                    fact2Text: 'The deepest spot on the planet at 11,034 meters. A stone dropped into it would take over an hour to reach the bottom. The pressure there is 1,000 times greater than at the surface.',
                    fact3Title: 'Underwater Rivers',
                    fact3Text: 'Real rivers and lakes of super-salty brine flow along the ocean floor, complete with their own riverbanks and even underwater waterfalls.',
                    fact4Title: 'Gold in Water',
                    fact4Text: 'About 20 million tons of gold are dissolved in the world\'s oceans. Unfortunately, it is so diluted that extracting it is not yet profitable.',
                    fact5Title: '91% Unknown',
                    fact5Text: 'Scientists estimate we have explored only 9% of the ocean depths. The ocean remains less mapped than the surface of Mars or the Moon.',
                    profileTitle: 'PROFILE',
                    profileNick: '0xInlate',
                    factsTitle: 'Fun Facts',
                    projectTitle: 'Project',
                    projectDates: 'may ? – 6, 2026',
                    projectRole: 'pastocode',
                    facts: [
                        'drank 5L tea  (не актуально)',
                        'listened whole playlist (не актуально)',
                        'will update site (актуально)',
                        'hosted on potato',
                        'radiation outside (не актуально)',
                        'already red (не актуально)',
                        'github pages paid? (не актуально)',
                        'beaver curse (не актуально)'
                    ]
                }
            };

            function tr(key) { return t[currentLang] && t[currentLang][key] ? t[currentLang][key] : key; }

            
            function updateI18n() {
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const k = el.getAttribute('data-i18n');
                    if (t[currentLang] && t[currentLang][k]) el.innerText = t[currentLang][k];
                });
                langIndicator.innerText = currentLang.toUpperCase();
                buildProfileSlides();
                updateTitleForCurrentState();
                if (currentTab === 'eng') buildOceanFullPage();
                localStorage.setItem('lang', currentLang);
            }

            function updateTitleForCurrentState() {
                if (currentTab === 'geo') setStaticTitle(tr('weatherTitle'));
                else if (currentTab === 'eng') setStaticTitle(tr('oceanTitle'));
                else if (currentTab === 'profile') setStaticTitle(tr('profileTitle'));
                else setStaticTitle('BURMALDASITE');
            }

            
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!?@#$%^&*()';
            const phases = [
                { type: 'random', dur: 700 },
                { type: 'fixed', text: 'data taken from various sites' },
                { type: 'random', dur: 700 },
                { type: 'fixed', text: 'work my dear chatgpt' },
                { type: 'random', dur: 700 },
                { type: 'fixed', text: 'depends which fabric' },
                { type: 'random', dur: 700 },
                { type: 'fixed', text: 'i did this for a week..' }
            ];

            function randStr(l = 12) {
                let s = '';
                for (let i = 0; i < l; i++) s += chars[Math.floor(Math.random() * chars.length)];
                return s;
            }

            function stopAnim() {
                if (animInterval) clearInterval(animInterval);
                if (animTimeout) clearTimeout(animTimeout);
                animInterval = null;
                animTimeout = null;
            }

            function startRandomPhase(dur, next) {
                stopAnim();
                animInterval = setInterval(() => {
                    if (animationActive) titleEl.innerText = randStr(12);
                }, 80);
                animTimeout = setTimeout(() => {
                    if (animInterval) clearInterval(animInterval);
                    animInterval = null;
                    next();
                }, dur);
            }

            function showFixed(text, next) {
                stopAnim();
                titleEl.innerText = text;
                animTimeout = setTimeout(next, 1800);
            }

            function runCycle(i) {
                if (!animationActive) return;
                if (i >= phases.length) { runCycle(0); return; }
                const p = phases[i];
                if (p.type === 'random') startRandomPhase(p.dur, () => runCycle(i + 1));
                else showFixed(p.text, () => runCycle(i + 1));
            }

            function startMainCycle() {
                animationActive = true;
                let c = 0;
                const int = setInterval(() => {
                    if (animationActive) titleEl.innerText = randStr(12);
                    c++;
                    if (c > 12) { clearInterval(int);
                        runCycle(0); }
                }, 90);
            }

            function setStaticTitle(text) {
                if (animationActive) { animationActive = false;
                    stopAnim(); }
                titleEl.innerText = text;
            }

            function resetToCycling() {
                if (!animationActive) { animationActive = true;
                    stopAnim();
                    startMainCycle(); }
            }

            // Случайный глитч
            setInterval(() => {
                if (Math.random() < 0.25 && animationActive) {
                    titleEl.classList.add('glitch-heavy');
                    setTimeout(() => titleEl.classList.remove('glitch-heavy'), 400);
                }
            }, 8000);

            
            function initParticles(count) {
                particles = [];
                for (let i = 0; i < count; i++) particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 4 + 1.2,
                    sx: (Math.random() - 0.5) * 0.5,
                    sy: (Math.random() - 0.5) * 0.4 - 0.12,
                    opacity: Math.random() * 0.5 + 0.2,
                    hue: 190 + Math.random() * 40
                });
            }

            function drawParticles() {
                ctx.clearRect(0, 0, w, h);
                const mx = mouseX,
                    my = mouseY;
                for (let p of particles) {
                    p.x += p.sx;
                    p.y += p.sy;
                    if (p.x < -10) p.x = w + 10;
                    if (p.x > w + 10) p.x = -10;
                    if (p.y < -10) p.y = h + 10;
                    if (p.y > h + 10) p.y = -10;
                    const dx = mx - p.x,
                        dy = my - p.y,
                        dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180 && dist > 0) {
                        const force = 0.012;
                        p.sx += (dx / dist) * force;
                        p.sy += (dy / dist) * force;
                        p.sx *= 0.98;
                        p.sy *= 0.98;
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue},70%,65%,${p.opacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsla(${p.hue},80%,55%,0.45)`;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                rafId = requestAnimationFrame(drawParticles);
            }

            function resizeCanvas() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                const density = w * h / 11000;
                const count = Math.min(100, Math.max(30, Math.floor(density)));
                initParticles(count);
            }
            let resizeDebounce;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(resizeCanvas, 200);
            });
            document.addEventListener('mousemove', e => { mouseX = e.clientX;
                mouseY = e.clientY; });
            document.addEventListener('touchmove', e => {
                if (e.touches.length) { mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY; }
            }, { passive: true });

            
            function addRipple(e, el) {
                const rect = el.getBoundingClientRect(),
                    ripple = document.createElement('span');
                ripple.className = 'ripple';
                const size = Math.max(rect.width, rect.height) * 1.5;
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                el.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }

           
            function hideAllTabs() {
                [geoContent, engContent, profileContent].forEach(c => c.classList.add('hidden'));
                currentTab = null;
                localStorage.removeItem('tab');
                resetToCycling();
            }

            function switchTab(tabId) {
                hideAllTabs();
                currentTab = tabId;
                localStorage.setItem('tab', tabId);
                if (tabId === 'geo') {
                    geoContent.classList.remove('hidden');
                    setStaticTitle(tr('weatherTitle'));
                } else if (tabId === 'eng') {
                    engContent.classList.remove('hidden');
                    buildOceanFullPage();
                    setStaticTitle(tr('oceanTitle'));
                } else if (tabId === 'profile') {
                    profileContent.classList.remove('hidden');
                    buildProfileSlides();
                    setStaticTitle(tr('profileTitle'));
                }
            }

            
            function buildOceanFullPage() {
                oceanFullContainer.innerHTML = `
                    <!-- ПРОМТ: Aerial view of deep blue ocean surface with sunlight penetrating the water, visible light rays descending into the dark abyss, cinematic atmosphere, photorealistic 1024x400 -->
                    <div class="ocean-banner" data-img="ocean-banner"><span>🖼️ ocean banner</span></div>
                    <h2>${tr('oceanTitle')}</h2>
                    <p class="ocean-intro">${tr('oceanIntro')}</p>
                    <div class="ocean-facts-grid">
                        <div class="ocean-fact-card">
                            <div class="fact-num">01</div>
                            <h3>${tr('fact1Title')}</h3>
                            <p>${tr('fact1Text')}</p>
                            <div class="fact-img-slot" data-img="ocean1"><span>🖼️ phytoplankton</span></div>
                        </div>
                        <div class="ocean-fact-card">
                            <div class="fact-num">02</div>
                            <h3>${tr('fact2Title')}</h3>
                            <p>${tr('fact2Text')}</p>
                            <div class="fact-img-slot" data-img="ocean2"><span>🖼️ mariana trench</span></div>
                        </div>
                        <div class="ocean-fact-card">
                            <div class="fact-num">03</div>
                            <h3>${tr('fact3Title')}</h3>
                            <p>${tr('fact3Text')}</p>
                            <div class="fact-img-slot" data-img="ocean3"><span>🖼️ underwater river</span></div>
                        </div>
                        <div class="ocean-fact-card">
                            <div class="fact-num">04</div>
                            <h3>${tr('fact4Title')}</h3>
                            <p>${tr('fact4Text')}</p>
                            <div class="fact-img-slot" data-img="ocean4"><span>🖼️ gold in water</span></div>
                        </div>
                        <div class="ocean-fact-card">
                            <div class="fact-num">05</div>
                            <h3>${tr('fact5Title')}</h3>
                            <p>${tr('fact5Text')}</p>
                            <div class="fact-img-slot" data-img="ocean5"><span>🖼️ deep sea creatures</span></div>
                        </div>
                    </div>
                    <button class="back-btn" data-back>${tr('backBtn')}</button>
                `;
                loadOceanImages();
                
                requestAnimationFrame(() => revealCardsOnScroll());
            }

            function revealCardsOnScroll() {
                const cards = oceanFullContainer.querySelectorAll('.ocean-fact-card');
                if (!cards.length) return;
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('revealed');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.2, root: oceanFullContainer });
                cards.forEach(card => observer.observe(card));
            }

            // ── Загрузка изображений океана ──────────────
            function loadOceanImages() {
                const imgMap = {
                    'ocean-banner': 'assets/image/1.png',
                    ocean1: 'assets/image/2.png',
                    ocean2: 'assets/image/3.png',
                    ocean3: 'assets/image/4.png',
                    ocean4: 'assets/image/5.png',
                    ocean5: 'assets/image/6.png'
                };
                document.querySelectorAll('#oceanFullContainer [data-img]').forEach(slot => {
                    const key = slot.getAttribute('data-img');
                    if (imgMap[key] && !slot.querySelector('img')) {
                        const img = document.createElement('img');
                        img.src = imgMap[key];
                        img.loading = 'lazy';
                        img.alt = key;
                        img.onload = () => {
                            const placeholder = slot.querySelector('span');
                            if (placeholder) placeholder.style.display = 'none';
                        };
                        img.onerror = () => {
                            const placeholder = slot.querySelector('span');
                            if (placeholder) placeholder.style.display = '';
                        };
                        slot.appendChild(img);
                    }
                });
            }

            
            function buildProfileSlides() {
                profileSlidesContainer.style.scrollSnapType = 'x mandatory';
                profileSlidesContainer.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-avatar">
                            <img src="assets/image/ava.png"
                            onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%230a1a2e%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%230080dd%22 font-size=%2220%22%3E0x%3C/text%3E%3C/svg%3E'"
                            alt="avatar">
                        </div>
                        <div class="profile-nick">${tr('profileNick')}</div>
                    </div>
                    <div class="profile-card" style="width:350px;">
                        <h3 style="color:#99d6ff;">${tr('factsTitle')}</h3>
                        ${t[currentLang].facts.map((f, i) => `<div class="fact-item"><strong>${currentLang === 'ru' ? 'Факт' : 'Fact'} ${i + 1}:</strong> ${f}</div>`).join('')}
                    </div>
                    <div class="profile-card" style="width:300px;">
                        <h3 style="color:#99d6ff;">${tr('projectTitle')}</h3>
                        <p style="text-align:center;line-height:1.5;"><strong>${currentLang === 'ru' ? 'Даты:' : 'Dates:'}</strong> ${tr('projectDates')}</p>
                        <p style="text-align:center;line-height:1.5;"><strong>${currentLang === 'ru' ? 'Роль:' : 'Role:'}</strong> ${tr('projectRole')}</p>
                    </div>`;
            }

            
            document.addEventListener('click', e => {
                const btn = e.target.closest('.panel-item');
                if (btn) {
                    const tab = btn.getAttribute('data-tab');
                    if (tab) switchTab(tab);
                    addRipple(e, btn);
                    return;
                }
                const backBtn = e.target.closest('[data-back]');
                if (backBtn) {
                    hideAllTabs();
                    addRipple(e, backBtn);
                    return;
                }
                if (e.target.closest('#langToggleBtn')) {
                    currentLang = currentLang === 'ru' ? 'en' : 'ru';
                    updateI18n();
                    addRipple(e, langToggleBtn);
                    return;
                }
                if (e.target.closest('#homeCrossBtn')) {
                    hideAllTabs();
                    addRipple(e, homeCrossBtn);
                    return;
                }
                const anyBtn = e.target.closest('button, .panel-item, .lang-switch, .home-cross');
                if (anyBtn && !e.target.closest('[data-back]') && !e.target.closest('.panel-item')) {
                    addRipple(e, anyBtn);
                }
            });

            
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE = 'burmalda-ocean-v1';
                    const ASSETS = ['/','index.html','assets/mine.ttf','assets/image/ava.png'];
                    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{}))));
                    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => { if(res && res.ok){ const clone = res.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); } return res; }).catch(() => caches.match(e.request)))));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
            }

            
            resizeCanvas();
            drawParticles();
            updateI18n();
            startMainCycle();

            
            if (currentTab) {
                switchTab(currentTab);
            } else {
                hideAllTabs();
            }
        })();
    </script>
</body>
</html>
